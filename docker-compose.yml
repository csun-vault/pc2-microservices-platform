services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-platform-backend
    user: root
    ports:
      - "3000:3000"    
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - ./backend/src/libs/services.registry.json:/app/dist/app/src/libs/services.registry.json
          - ./backend/microservices:/app/dist/app/src/modules/microservices/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: ms-platform-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - DOCKER_ENV=true
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped