services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-platform-backend
    ports:
      - "3000:3000"    
    environment:
      - PORT=3000
      - HOST=localhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/src/libs/services.registry.json:/app/src/libs/services.registry.json
      - ./backend/microservices:/app/microservices
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: ms-platform-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped